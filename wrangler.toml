name = "app"
main = "workers/app.ts"
compatibility_date = "2025-04-04"
compatibility_flags = ["nodejs_compat_v2"]

routes = [
  { pattern = "tabletennis.reviews", custom_domain = true }
]

[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "tt-reviews-prod"

# Rate limiting bindings — SECURITY.md Phase 8 (TT-17). The in-memory
# Map in security.server.ts cannot share state across Worker isolates,
# so without these bindings a 5-per-minute cap is enforced only
# per-isolate. These bindings back the same budgets with Cloudflare's
# edge-wide rate limiter. namespace_id values only have to be unique
# within this Worker.
[[unsafe.bindings]]
name = "FORM_RATE_LIMITER"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "DISCORD_RATE_LIMITER"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 20, period = 10 }

[[unsafe.bindings]]
name = "ADMIN_RATE_LIMITER"
type = "ratelimit"
namespace_id = "2003"
simple = { limit = 30, period = 60 }

# Deploy-time gate: `wrangler versions upload` and `wrangler deploy` fail if
# any of these secrets aren't configured on the Worker. CI promotes a new
# version only after upload succeeds, so a missing secret keeps prod on the
# previous version instead of going live in a broken state. Format-level
# checks (e.g. SESSION_SECRET >= 16 chars, no Discord placeholders) live in
# validateEnv() at the fetch entry — see app/lib/env.server.ts. Adding a new
# secret? Append it here and to .dev.vars.example, and decide whether it
# also needs a format check in validateEnv.
[secrets]
required = [
  "SUPABASE_URL",
  "SUPABASE_ANON_KEY",
  "SUPABASE_SERVICE_ROLE_KEY",
  "SESSION_SECRET",
  "DISCORD_PUBLIC_KEY",
  "DISCORD_BOT_TOKEN",
  "DISCORD_CHANNEL_ID",
  "DISCORD_ALLOWED_ROLES",
  "AUTO_ADMIN_EMAILS",
]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
SITE_URL = "https://tabletennis.reviews"
R2_BUCKET_NAME = "tt-reviews-prod"

# Local dev settings
[env.dev]
host = "tt-reviews.local"
port = 8787

[[env.dev.r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "tt-reviews-dev"

[[env.dev.unsafe.bindings]]
name = "FORM_RATE_LIMITER"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 5, period = 60 }

[[env.dev.unsafe.bindings]]
name = "DISCORD_RATE_LIMITER"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 20, period = 10 }

[[env.dev.unsafe.bindings]]
name = "ADMIN_RATE_LIMITER"
type = "ratelimit"
namespace_id = "2003"
simple = { limit = 30, period = 60 }

[env.dev.vars]
ENVIRONMENT = "development"
SUPABASE_URL = "http://tt-reviews.local:54321"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
