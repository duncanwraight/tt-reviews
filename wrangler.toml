name = "app"
main = "workers/app.ts"
compatibility_date = "2025-04-04"
compatibility_flags = ["nodejs_compat_v2"]

# Per-version preview subdomain (`<version>-app.tt-reviews.workers.dev`).
# The CI gradual-deploy flow's `Smoke test preview` step runs against
# this URL before promoting a version to 100% traffic. Cloudflare
# disables preview URLs by default when `workers_dev` is off and this
# flag is unset. `workers_dev = true` is intentionally NOT set:
# production traffic is bound to the custom domain below and we don't
# want a shadow copy serving live requests at `app.tt-reviews.workers.dev`.
preview_urls = true

routes = [
  { pattern = "tabletennis.reviews", custom_domain = true }
]

[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "tt-reviews-prod"

# TT-90 sourcing-provider quota counters (daily + monthly per-provider).
# Created via `wrangler kv namespace create PROVIDER_QUOTA` and the
# corresponding --preview variant. Keys: `provider:<name>:daily:<YYYY-
# MM-DD>` (TTL 25h), `provider:<name>:monthly:<YYYY-MM>` (TTL 32d).
[[kv_namespaces]]
binding = "PROVIDER_QUOTA"
id = "c873bc3d238440e2bc1a9cab26fe4ab2"
preview_id = "203acdd5669c4ba89714ec8797ba46df"

# TT-91 — Cloudflare Queue for background photo sourcing. The same
# Worker is both producer (admin "Enqueue all unsourced" action sends
# one message per row) and consumer (queue() handler processes messages
# in order, with backoff on out_of_budget). max_concurrency=1 keeps the
# queue serialised so per-second rate-limits and shared bursting don't
# collide. max_batch_size=1 means we get one row per invocation —
# simpler retry semantics.
[[queues.producers]]
queue = "equipment-photo-source"
binding = "PHOTO_SOURCE_QUEUE"

[[queues.consumers]]
queue = "equipment-photo-source"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 1
max_retries = 5
dead_letter_queue = "equipment-photo-source-dlq"

# TT-149 — spec-sourcing pipeline queue. Separate queue from the
# photo-sourcing one so the per-host throttle on en.butterfly.tt /
# tabletennis11.com / revspin.net doesn't collide with Brave-image
# QPS, and so a stuck photo-source DLQ doesn't block spec-sourcing
# work. Same max_batch_size=1 / max_concurrency=1 rationale as the
# photo queue: politeness throttles + Gemini RPM caps assume one in-
# flight message per isolate.
[[queues.producers]]
queue = "spec-source-queue"
binding = "SPEC_SOURCE_QUEUE"

[[queues.consumers]]
queue = "spec-source-queue"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 1
max_retries = 5
dead_letter_queue = "spec-source-dlq"

# Rate limiting bindings — SECURITY.md Phase 8 (TT-17). The in-memory
# Map in security.server.ts cannot share state across Worker isolates,
# so without these bindings a 5-per-minute cap is enforced only
# per-isolate. These bindings back the same budgets with Cloudflare's
# edge-wide rate limiter. namespace_id values only have to be unique
# within this Worker.
[[ratelimits]]
name = "FORM_RATE_LIMITER"
namespace_id = "2001"
simple = { limit = 5, period = 60 }

[[ratelimits]]
name = "DISCORD_RATE_LIMITER"
namespace_id = "2002"
simple = { limit = 20, period = 10 }

[[ratelimits]]
name = "ADMIN_RATE_LIMITER"
namespace_id = "2003"
simple = { limit = 30, period = 60 }

# Brave search QPS cap — TT-90. Brave's free tier is 1 query/sec.
# Cloudflare's rate-limiter binding only accepts period values of 10 or
# 60 (Miniflare enforces the same), so we approximate with limit=10 in
# any 10-sec window — average 1/s with burst tolerance. App-side
# pacing (bulk.server.ts DEFAULT_BRAVE_GAP_MS = 1100ms) handles the
# "don't burst" job; this binding is the global runaway ceiling. The
# daily/monthly cap (~2000/month) is layered on top via the
# PROVIDER_QUOTA KV namespace (see app/lib/photo-sourcing/providers/
# budget.ts).
[[ratelimits]]
name = "BRAVE_RATE_LIMITER"
namespace_id = "2004"
simple = { limit = 10, period = 10 }

[observability]
enabled = true
head_sampling_rate = 1

# Cron triggers — local triggers via:
#   curl 'http://tt-reviews.local:8787/__scheduled?cron=<cron+spec>'
# (only with `wrangler dev`, not with `react-router dev`).
#
# - "0 3 * * *":     daily recompute of equipment_similar (TT-70).
# - "0 */6 * * *":   spec-sourcing pipeline enqueue (TT-149) — every
#                    6 hours pick a batch of equipment due for spec
#                    sourcing and enqueue messages onto SPEC_SOURCE_QUEUE.
[triggers]
crons = ["0 3 * * *", "0 */6 * * *"]

[vars]
ENVIRONMENT = "production"
SITE_URL = "https://tabletennis.reviews"
R2_BUCKET_NAME = "tt-reviews-prod"
# DISCORD_ALERTS_CHANNEL_ID is intentionally set as a wrangler secret in
# prod (not here) — top-level [vars] wins over .dev.vars under
# `react-router dev`, so listing it here would poison local dev with the
# prod channel ID. Set via:
#   wrangler secret put DISCORD_ALERTS_CHANNEL_ID
# See docs/OBSERVABILITY.md.

# Local dev settings
[env.dev]
host = "tt-reviews.local"
port = 8787

[[env.dev.r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "tt-reviews-dev"

[[env.dev.kv_namespaces]]
binding = "PROVIDER_QUOTA"
id = "203acdd5669c4ba89714ec8797ba46df"

[[env.dev.queues.producers]]
queue = "equipment-photo-source-dev"
binding = "PHOTO_SOURCE_QUEUE"

[[env.dev.queues.consumers]]
queue = "equipment-photo-source-dev"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 1
max_retries = 5
dead_letter_queue = "equipment-photo-source-dev-dlq"

[[env.dev.queues.producers]]
queue = "spec-source-queue-dev"
binding = "SPEC_SOURCE_QUEUE"

[[env.dev.queues.consumers]]
queue = "spec-source-queue-dev"
max_batch_size = 1
max_batch_timeout = 5
max_concurrency = 1
max_retries = 5
dead_letter_queue = "spec-source-dlq-dev"

[[env.dev.ratelimits]]
name = "FORM_RATE_LIMITER"
namespace_id = "2001"
simple = { limit = 5, period = 60 }

[[env.dev.ratelimits]]
name = "DISCORD_RATE_LIMITER"
namespace_id = "2002"
simple = { limit = 20, period = 10 }

[[env.dev.ratelimits]]
name = "ADMIN_RATE_LIMITER"
namespace_id = "2003"
simple = { limit = 30, period = 60 }

[[env.dev.ratelimits]]
name = "BRAVE_RATE_LIMITER"
namespace_id = "2004"
simple = { limit = 10, period = 10 }

[env.dev.vars]
ENVIRONMENT = "development"
SUPABASE_URL = "http://tt-reviews.local:54321"
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
SESSION_SECRET = "dev-secret-change-in-production"
