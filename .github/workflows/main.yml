name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase in background
        run: |
          supabase start -x studio,edge-runtime,logflare,vector,imgproxy > /tmp/supabase-start.log 2>&1 &
          echo $! > /tmp/supabase-start.pid
          echo "Supabase start PID: $(cat /tmp/supabase-start.pid)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache React Router types
        uses: actions/cache@v4
        with:
          path: .react-router/types
          key: rr-types-${{ runner.os }}-${{ hashFiles('app/routes/**', 'app/routes.ts', 'react-router.config.ts') }}

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Prettier
        run: npx prettier --check .

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for Supabase to be ready
        run: |
          TIMEOUT=180
          ELAPSED=0
          PID=$(cat /tmp/supabase-start.pid)
          echo "Waiting for Supabase REST API (PID $PID)..."
          until curl -fs http://127.0.0.1:54321/rest/v1/ > /dev/null 2>&1; do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "ERROR: supabase start exited early" >&2
              tail -80 /tmp/supabase-start.log
              exit 1
            fi
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "ERROR: Supabase REST API did not start within ${TIMEOUT}s" >&2
              tail -80 /tmp/supabase-start.log
              exit 1
            fi
            sleep 3
            ELAPSED=$((ELAPSED + 3))
          done
          echo "REST API ready after ${ELAPSED}s, waiting for Auth..."
          until curl -fs http://127.0.0.1:54321/auth/v1/health > /dev/null 2>&1; do
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "ERROR: Supabase Auth did not start within ${TIMEOUT}s" >&2
              tail -80 /tmp/supabase-start.log
              exit 1
            fi
            sleep 3
            ELAPSED=$((ELAPSED + 3))
          done
          echo "Supabase ready after ${ELAPSED}s total"

      - name: RLS tests (pgTAP)
        run: supabase test db

      - name: Write .dev.vars for e2e
        run: |
          cat > .dev.vars <<'EOF'
          SUPABASE_URL=http://localhost:54321
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
          SESSION_SECRET=e2e-session-secret
          SITE_URL=http://localhost:5173
          DISCORD_PUBLIC_KEY=bf98a44479fb79df5a22a93bec408ecae0535f182152932022236205b9ea4480
          DISCORD_BOT_TOKEN=stub
          DISCORD_CHANNEL_ID=stub
          DISCORD_GUILD_ID=stub
          DISCORD_ALLOWED_ROLES=role_e2e_moderator
          EOF

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Supabase start log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-start-log
          path: /tmp/supabase-start.log
          retention-days: 7

  deploy:
    name: Deploy
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Binds this job to the `production` GitHub Environment. If that
    # environment has a required reviewer configured in repo Settings
    # → Environments, the deploy pauses here for manual approval.
    # Until that's set up this line is a no-op; configuring the reviewer
    # is a one-time repo-settings change, not a workflow change.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Upload worker version (no traffic)
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          OUTPUT=$(npx wrangler versions upload 2>&1 | tee /tmp/wrangler-upload.log)
          VERSION_ID=$(echo "$OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          PREVIEW_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.workers\.dev' | head -1)
          if [ -z "$VERSION_ID" ] || [ -z "$PREVIEW_URL" ]; then
            echo "::error::Failed to parse version ID or preview URL from wrangler output"
            exit 1
          fi
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Uploaded version $VERSION_ID → $PREVIEW_URL"

      - name: Deploy migrations
        run: supabase db push --db-url ${{ secrets.SUPABASE_DB_URL }}

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Smoke test preview
        id: smoke_preview
        env:
          PLAYWRIGHT_SMOKE_BASE_URL: ${{ steps.upload.outputs.preview_url }}
        run: npm run test:smoke

      - name: Upload smoke-preview report
        if: always() && steps.smoke_preview.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-preview-report
          path: playwright-report/
          retention-days: 7

      - name: Promote version to 100% traffic
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERSION_ID: ${{ steps.upload.outputs.version_id }}
        run: |
          npx wrangler versions deploy "$VERSION_ID@100%" \
            --message "CI promote ${{ github.sha }}" \
            --yes

      - name: Smoke test prod
        id: smoke_prod
        continue-on-error: true
        env:
          PLAYWRIGHT_SMOKE_BASE_URL: https://tabletennis.reviews
        run: npm run test:smoke

      - name: Upload smoke-prod report
        if: always() && steps.smoke_prod.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-prod-report
          path: playwright-report/
          retention-days: 7

      - name: Rollback on prod smoke failure
        if: steps.smoke_prod.outcome == 'failure'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Prod smoke failed — rolling back to previous deployment"
          npx wrangler rollback \
            --message "CI rollback from ${{ github.sha }} (prod smoke failed)" \
            --yes
          echo "::error::Prod smoke failed, rolled back to previous deployment"
          exit 1
