name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase in background
        run: |
          supabase start -x studio,edge-runtime,logflare,vector,imgproxy > /tmp/supabase-start.log 2>&1 &
          echo $! > /tmp/supabase-start.pid
          echo "Supabase start PID: $(cat /tmp/supabase-start.pid)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache React Router types
        uses: actions/cache@v4
        with:
          path: .react-router/types
          key: rr-types-${{ runner.os }}-${{ hashFiles('app/routes/**', 'app/routes.ts', 'react-router.config.ts') }}

      - name: Typecheck
        run: npm run typecheck

      - name: Prettier
        run: npx prettier --check .

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for Supabase to be ready
        run: |
          TIMEOUT=180
          ELAPSED=0
          PID=$(cat /tmp/supabase-start.pid)
          echo "Waiting for Supabase REST API (PID $PID)..."
          until curl -fs http://127.0.0.1:54321/rest/v1/ > /dev/null 2>&1; do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "ERROR: supabase start exited early" >&2
              tail -80 /tmp/supabase-start.log
              exit 1
            fi
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "ERROR: Supabase REST API did not start within ${TIMEOUT}s" >&2
              tail -80 /tmp/supabase-start.log
              exit 1
            fi
            sleep 3
            ELAPSED=$((ELAPSED + 3))
          done
          echo "REST API ready after ${ELAPSED}s, waiting for Auth..."
          until curl -fs http://127.0.0.1:54321/auth/v1/health > /dev/null 2>&1; do
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "ERROR: Supabase Auth did not start within ${TIMEOUT}s" >&2
              tail -80 /tmp/supabase-start.log
              exit 1
            fi
            sleep 3
            ELAPSED=$((ELAPSED + 3))
          done
          echo "Supabase ready after ${ELAPSED}s total"

      - name: Write .dev.vars for e2e
        run: |
          cat > .dev.vars <<'EOF'
          SUPABASE_URL=http://127.0.0.1:54321
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
          SESSION_SECRET=e2e-session-secret
          SITE_URL=http://localhost:5173
          DISCORD_PUBLIC_KEY=stub
          DISCORD_BOT_TOKEN=stub
          DISCORD_CHANNEL_ID=stub
          DISCORD_GUILD_ID=stub
          DISCORD_ALLOWED_ROLES=stub
          EOF

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Supabase start log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-start-log
          path: /tmp/supabase-start.log
          retention-days: 7

  deploy:
    name: Deploy
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations
        run: supabase db push --db-url ${{ secrets.SUPABASE_DB_URL }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
