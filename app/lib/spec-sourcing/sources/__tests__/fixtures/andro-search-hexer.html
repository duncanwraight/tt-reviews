<!doctype html>
<html lang="en"><body>

     anchor. Excerpt blocks are kept lightly trimmed to mirror the real
     markup. -->

      <div class="search-result__title">
        <a class="stretched-link" href="/en/hexer-powergrip">
          Hexer Powergrip
        </a>
      </div>
      <div class="search-result__excerpt">
        … <strong>Hexer</strong> Powergrip Spin …
      </div>
    </div>
  </div>
  <div class="search-result__item">
    <div class="search-result__image">
      <img src="/sites/default/files/Hexer_POWERGRIP_SFX.jpg" alt="" loading="lazy" />
    </div>
